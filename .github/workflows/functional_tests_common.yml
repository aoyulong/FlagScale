name: Common Functional Tests

on:
  workflow_call:
    inputs:
      type:
        required: true
        type: string
      tasks_json:
        required: true
        type: string
        description: JSON array of tasks to run
      image:
        required: true
        type: string
      runs_on:
        required: true
        type: string
      container_volumes:
        required: true
        type: string
      container_options:
        required: true
        type: string

jobs:
  functional_test:
    runs-on: ${{ fromJson(inputs.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        task: ${{ fromJson(inputs.tasks_json) }}
    name: ${{ inputs.type }}-${{ matrix.task }}
    container:
      image: ${{ inputs.image }}
      ports:
        - 80
      volumes: ${{ fromJson(inputs.container_volumes) }}
      options: ${{ inputs.container_options }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          ssh-strict: true
          ssh-user: git
          persist-credentials: true
          clean: true
          sparse-checkout-cone-mode: true
          fetch-tags: false
          show-progress: true
          lfs: false
          submodules: false
          set-safe-directory: true

      - name: Run functional test
        shell: bash
        run: |
          set -euo pipefail
          cd /__w/FlagScale/FlagScale
          git config --global --add safe.directory /__w/FlagScale/FlagScale
          
          TASK='${{ matrix.task }}'
          TYPE='${{ inputs.type }}'
          
          echo "Running functional test ($TYPE) for task: $TASK"
          
          # Setup backend
          source /root/miniconda3/bin/activate flagscale-train
          git clone https://github.com/flagos-ai/Megatron-LM-FL.git
          cd Megatron-LM-FL && pip install --no-build-isolation . && cd -
          pip install httpx multi-storage-client boto3 google-cloud-storage fastapi uvicorn griffe
          
          # Run test for this task
          tests/scripts/functional_tests/test_task.sh --type "$TYPE" --task "$TASK"
        timeout-minutes: 90