name: Common Functional Tests

on:
  workflow_call:
    inputs:
      type:
        required: true
        type: string
      tasks_json:
        required: true
        type: string
        description: JSON array of tasks to run
      image:
        required: true
        type: string
      runs_on:
        required: true
        type: string
      container_volumes:
        required: true
        type: string
      container_options:
        required: true
        type: string

jobs:
  functional_test:
    runs-on: ${{ fromJson(inputs.runs_on) }}
    container:
      image: ${{ inputs.image }}
      ports:
        - 80
      volumes: ${{ fromJson(inputs.container_volumes) }}
      options: ${{ inputs.container_options }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          ssh-strict: true
          ssh-user: git
          persist-credentials: true
          clean: true
          sparse-checkout-cone-mode: true
          fetch-tags: false
          show-progress: true
          lfs: false
          submodules: false
          set-safe-directory: true
      
      - name: Install jq (JSON parser)
        shell: bash
        run: |
          set -euo pipefail
          if command -v jq >/dev/null 2>&1; then
            echo "jq already installed: $(jq --version)"
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update -y && apt-get install -y jq
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache jq
          elif command -v yum >/dev/null 2>&1; then
            yum install -y jq || true
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y jq || true
          elif command -v microdnf >/dev/null 2>&1; then
            microdnf install -y jq || true
          else
            echo "Package manager not found; downloading jq binary"
            curl -fsSL -o /usr/local/bin/jq https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64
            chmod +x /usr/local/bin/jq
          fi
          jq --version

      - name: Run functional tests for all tasks
        shell: bash
        run: |
          set -euo pipefail
          cd /__w/FlagScale/FlagScale
          git config --global --add safe.directory /__w/FlagScale/FlagScale
          
          TASKS='${{ inputs.tasks_json }}'
          TYPE='${{ inputs.type }}'
          
          echo "Running functional tests ($TYPE) for tasks: $TASKS"
          
          # Setup backend
          source /root/miniconda3/bin/activate flagscale-train
          git clone https://github.com/flagos-ai/Megatron-LM-FL.git
          cd Megatron-LM-FL && pip install --no-build-isolation . && cd -
          pip install httpx multi-storage-client boto3 google-cloud-storage fastapi uvicorn griffe
          
          # Run tests for each task
          for task in $(echo "$TASKS" | jq -r '.[]'); do
            echo "=========================================="
            echo "Running functional tests ($TYPE) for task: $task"
            echo "=========================================="
            tests/scripts/functional_tests/test_task.sh --type "$TYPE" --task "$task"
          done
        timeout-minutes: 90