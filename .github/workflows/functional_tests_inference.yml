name: Common Functional Tests - Inference

# PLACEHOLDER: This workflow is a placeholder for future inference task implementation
# When inference tasks are added, this workflow will be fully implemented

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
        description: Platform name (e.g., cuda, default)
      test_matrix:
        required: true
        type: string
        description: JSON array of test configurations
      image:
        required: true
        type: string
      runs_on:
        required: true
        type: string
      container_volumes:
        required: true
        type: string
      container_options:
        required: true
        type: string
      source_artifact:
        required: true
        type: string
        description: Name of the artifact containing source code

jobs:
  functional_test_inference:
    runs-on: ${{ fromJson(inputs.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        test_config: ${{ fromJson(inputs.test_matrix) }}
    container:
      image: ${{ inputs.image }}
      ports:
        - 80
      volumes: ${{ fromJson(inputs.container_volumes) }}
      options: ${{ inputs.container_options }}

    steps:
      - name: Download source code artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.source_artifact }}
          path: /tmp

      - name: Extract source code
        shell: bash
        run: |
          mkdir -p /__w/FlagScale/FlagScale
          tar -xzf /tmp/flagscale-source.tar.gz -C /__w/FlagScale/FlagScale

      - name: Set safe directory
        shell: bash
        run: |
          git config --global --add safe.directory /__w/FlagScale/FlagScale

      - name: Placeholder - Install dependencies for inference
        shell: bash
        run: |
          set -euo pipefail
          cd /__w/FlagScale/FlagScale

          echo "⚠️  PLACEHOLDER: Inference task not yet implemented"
          echo "When implemented, this step will:"
          echo "  - Activate flagscale-inference conda environment"
          echo "  - Run: ./install/install.sh --platform cuda --task inference --skip-conda-create --retry-count 3"
          echo ""
          echo "Skipping for now as no inference tests are defined."
        timeout-minutes: 1

      - name: Placeholder - Run functional tests
        id: functional_test
        shell: bash
        run: |
          echo "⚠️  PLACEHOLDER: Inference functional tests not yet implemented"
          echo "When implemented, this will run inference tests using run_tests.sh"
          echo "✅ Placeholder completed successfully"
          echo "exit_code=0" >> $GITHUB_OUTPUT
        timeout-minutes: 1
