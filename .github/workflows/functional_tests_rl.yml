name: Common Functional Tests - RL

# PLACEHOLDER: This workflow is a placeholder for future rl task implementation
# When rl tasks are added, this workflow will be fully implemented

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
        description: Platform name (e.g., cuda, default)
      test_matrix:
        required: true
        type: string
        description: JSON array of test configurations
      image:
        required: true
        type: string
      runs_on:
        required: true
        type: string
      container_volumes:
        required: true
        type: string
      container_options:
        required: true
        type: string
      source_artifact:
        required: true
        type: string
        description: Name of the artifact containing source code
      conda_env:
        required: false
        type: string
        description: Conda environment name (optional, skips conda if not provided)
        default: ""
      conda_path:
        required: false
        type: string
        description: Conda installation path (optional, auto-detects if not provided)
        default: "/root/miniconda3"

jobs:
  functional_test_rl:
    defaults:
      run:
        shell: bash
    env:
      PROJECT_ROOT: /workspace/FlagScale
    runs-on: ${{ fromJson(inputs.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        test_config: ${{ fromJson(inputs.test_matrix) }}
    container:
      image: ${{ inputs.image }}
      ports:
        - 80
      volumes: ${{ fromJson(inputs.container_volumes) }}
      options: ${{ inputs.container_options }}

    steps:
      - name: Download source code artifact (attempt 1)
        uses: actions/download-artifact@v4
        continue-on-error: true
        id: download_attempt_1
        with:
          name: ${{ inputs.source_artifact }}
          path: /tmp

      - name: Download source code artifact (attempt 2)
        if: steps.download_attempt_1.outcome == 'failure'
        uses: actions/download-artifact@v4
        continue-on-error: true
        id: download_attempt_2
        with:
          name: ${{ inputs.source_artifact }}
          path: /tmp

      - name: Download source code artifact (attempt 3)
        if: steps.download_attempt_2.outcome == 'failure'
        uses: actions/download-artifact@v4
        id: download_attempt_3
        with:
          name: ${{ inputs.source_artifact }}
          path: /tmp

      - name: Verify artifact download
        run: |
          if [ "${{ steps.download_attempt_1.outcome }}" == "success" ]; then
            echo "✅ Artifact downloaded successfully on attempt 1"
          elif [ "${{ steps.download_attempt_2.outcome }}" == "success" ]; then
            echo "✅ Artifact downloaded successfully on attempt 2 (retried once)"
          elif [ "${{ steps.download_attempt_3.outcome }}" == "success" ]; then
            echo "✅ Artifact downloaded successfully on attempt 3 (retried twice)"
          else
            echo "❌ Error: All 3 download attempts failed"
            echo "Artifact name: ${{ inputs.source_artifact }}"
            exit 1
          fi

      - name: Extract source code
        run: |
          mkdir -p $PROJECT_ROOT
          tar -xzf /tmp/flagscale-source.tar.gz -C $PROJECT_ROOT

      - name: Set safe directory
        run: |
          git config --global --add safe.directory $PROJECT_ROOT

      - name: Placeholder - Install dependencies for rl
        run: |
          set -euo pipefail
          cd $PROJECT_ROOT

          echo "⚠️  PLACEHOLDER: RL task not yet implemented"
          echo "When implemented, this step will:"
          echo "  - Activate flagscale-rl conda environment"
          echo "  - Run: ./tools/install/install.sh --platform cuda --task rl --skip-conda-create --retry-count 3"
          echo ""
          echo "Skipping for now as no rl tests are defined."
        timeout-minutes: 1

      - name: Placeholder - Run functional tests
        id: functional_test
        run: |
          echo "⚠️  PLACEHOLDER: RL functional tests not yet implemented"
          echo "When implemented, this will run rl tests using run_tests.sh"
          echo "✅ Placeholder completed successfully"
          echo "exit_code=0" >> $GITHUB_OUTPUT
        timeout-minutes: 1
