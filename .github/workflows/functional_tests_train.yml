name: Common Functional Tests - Training

on:
  workflow_call:
    inputs:
      platform:
        required: true
        type: string
        description: Platform name (e.g., cuda, default)
      test_matrix:
        required: true
        type: string
        description: JSON array of test configurations
      image:
        required: true
        type: string
      runs_on:
        required: true
        type: string
      container_volumes:
        required: true
        type: string
      container_options:
        required: true
        type: string
      source_artifact:
        required: true
        type: string
        description: Name of the artifact containing source code

jobs:
  functional_test_train:
    runs-on: ${{ fromJson(inputs.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        test_config: ${{ fromJson(inputs.test_matrix) }}
    container:
      image: ${{ inputs.image }}
      ports:
        - 80
      volumes: ${{ fromJson(inputs.container_volumes) }}
      options: ${{ inputs.container_options }}

    steps:
      - name: Download source code artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.source_artifact }}
          path: /tmp

      - name: Extract source code
        shell: bash
        run: |
          mkdir -p /__w/FlagScale/FlagScale
          tar -xzf /tmp/flagscale-source.tar.gz -C /__w/FlagScale/FlagScale

      - name: Set safe directory
        shell: bash
        run: |
          git config --global --add safe.directory /__w/FlagScale/FlagScale

      - name: Install dependencies for training
        shell: bash
        run: |
          set -euo pipefail
          cd /__w/FlagScale/FlagScale

          source /root/miniconda3/bin/activate flagscale-train

          # Use install script for training dependencies
          ./install/install.sh \
            --task train \
            --skip-conda-create \
            --retry-count 3
        timeout-minutes: 30

      - name: Run functional tests
        id: functional_test
        shell: bash
        run: |
          set -euo pipefail
          cd /__w/FlagScale/FlagScale

          PLATFORM='${{ inputs.platform }}'
          DEVICE='${{ matrix.test_config.device }}'
          TASK='${{ matrix.test_config.task }}'
          MODEL='${{ matrix.test_config.model }}'
          CASE='${{ matrix.test_config.case }}'
          PROJECT_ROOT="/__w/FlagScale/FlagScale"

          echo "Running functional tests for training"
          echo "Platform: $PLATFORM"
          echo "Device: $DEVICE"
          echo "Task: $TASK"
          echo "Model: $MODEL"
          echo "Case: ${CASE:-all}"
          echo "Project root: $PROJECT_ROOT"

          # Activate conda environment
          source /root/miniconda3/bin/activate flagscale-train

          # Run functional tests using run_tests.sh
          bash "$PROJECT_ROOT/tests/test_utils/runners/run_tests.sh" \
            --platform "$PLATFORM" \
            --device "$DEVICE" \
            --type functional \
            --task "$TASK" \
            --model "$MODEL" \
            --list "$CASE"
          exit_code=$?

          if [ $exit_code -eq 0 ]; then
            echo "✅ Functional tests passed for $PLATFORM/$DEVICE/$TASK/$MODEL/$CASE"
          else
            echo "❌ Functional tests failed for $PLATFORM/$DEVICE/$TASK/$MODEL/$CASE (exit code: $exit_code)"
          fi

          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          exit $exit_code
        timeout-minutes: 180
