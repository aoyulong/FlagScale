name: Common Unit Tests

on:
  workflow_call:
    inputs:
      backend:
        required: true
        type: string
      subsets_json:
        required: true
        type: string
        description: JSON array of subsets to run
      image:
        required: true
        type: string
      runs_on:
        required: true
        type: string
      container_volumes:
        required: true
        type: string
      container_options:
        required: true
        type: string

jobs:
  unit_test:
    runs-on: ${{ fromJson(inputs.runs_on) }}
    container:
      image: ${{ inputs.image }}
      ports:
        - 80
      volumes: ${{ fromJson(inputs.container_volumes) }}
      options: ${{ inputs.container_options }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          ssh-strict: true
          ssh-user: git
          persist-credentials: true
          clean: true
          sparse-checkout-cone-mode: true
          fetch-tags: false
          show-progress: true
          lfs: false
          submodules: false
          set-safe-directory: true

      - name: Install jq (JSON parser)
        shell: bash
        run: |
          set -euo pipefail
          if command -v jq >/dev/null 2>&1; then
            echo "jq already installed: $(jq --version)"
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update -y && apt-get install -y jq
          elif command -v apk >/dev/null 2>&1; then
            apk add --no-cache jq
          elif command -v yum >/dev/null 2>&1; then
            yum install -y jq || true
          elif command -v dnf >/dev/null 2>&1; then
            dnf install -y jq || true
          elif command -v microdnf >/dev/null 2>&1; then
            microdnf install -y jq || true
          else
            echo "Package manager not found; downloading jq binary"
            curl -fsSL -o /usr/local/bin/jq https://github.com/jqlang/jq/releases/download/jq-1.7.1/jq-linux-amd64
            chmod +x /usr/local/bin/jq
          fi
          jq --version

      - name: Run unit tests for all subsets
        shell: bash
        run: |
          set -euo pipefail
          cd /__w/FlagScale/FlagScale
          git config --global --add safe.directory /__w/FlagScale/FlagScale
          
          SUBSETS='${{ inputs.subsets_json }}'
          BACKEND='${{ inputs.backend }}'
          SHA='${{ github.sha }}'
          
          echo "Running unit tests for subsets: $SUBSETS"
          
          # Setup backend if needed
          if [ "$BACKEND" = "train_flagscale" ]; then
            mkdir -p /opt/data
            cp -r /home/gitlab-runner/data/Megatron-LM/* /opt/data/ || true
            cp -r /home/gitlab-runner/tokenizers/Megatron-LM/* /opt/data/ || true
            source /root/miniconda3/bin/activate flagscale-train
            git clone https://github.com/flagos-ai/Megatron-LM-FL.git
            cd Megatron-LM-FL && pip install --no-build-isolation . && cd -
          fi
          
          # Run tests for each subset
          for subset in $(echo "$SUBSETS" | jq -r '.[]'); do
            echo "=========================================="
            echo "Running unit tests for subset: $subset"
            echo "=========================================="
            tests/scripts/unit_tests/test_subset.sh --backend "$BACKEND" --subset "$subset" --id "$SHA"
          done
        timeout-minutes: 90